<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Agent Swarm Game - Live Preview</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #0a0a0a;
        color: #f7f7f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 0%, rgba(72, 160, 220, 0.18), transparent 32rem),
          linear-gradient(135deg, #0a0a0a 0%, #181818 52%, #101820 100%);
      }

      main {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        gap: 1rem;
        padding: clamp(1rem, 3vw, 2rem);
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 1rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.35rem, 2.5vw, 2.25rem);
        line-height: 1.05;
      }

      p {
        margin: 0.4rem 0 0;
        max-width: 52rem;
        color: #c9d1d9;
        line-height: 1.5;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: flex-end;
      }

      a {
        border: 1px solid rgba(247, 247, 247, 0.22);
        border-radius: 0.45rem;
        color: #f7f7f7;
        padding: 0.55rem 0.75rem;
        text-decoration: none;
      }

      a:focus,
      a:hover {
        border-color: #58a6ff;
        color: #9bd1ff;
      }

      .browser {
        display: flex;
        min-height: min(74vh, 58rem);
        flex: 1;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(247, 247, 247, 0.18);
        border-radius: 0.5rem;
        background: #050505;
        box-shadow: 0 1.5rem 5rem rgba(0, 0, 0, 0.42);
      }

      .bar {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 0.75rem;
        border-bottom: 1px solid rgba(247, 247, 247, 0.12);
        background: #151515;
        padding: 0.65rem 0.85rem;
      }

      .lights {
        display: flex;
        gap: 0.4rem;
      }

      .lights span {
        display: block;
        width: 0.72rem;
        height: 0.72rem;
        border-radius: 50%;
      }

      .lights span:nth-child(1) {
        background: #ff5f57;
      }

      .lights span:nth-child(2) {
        background: #febc2e;
      }

      .lights span:nth-child(3) {
        background: #28c840;
      }

      .address {
        overflow: hidden;
        border: 1px solid rgba(247, 247, 247, 0.14);
        border-radius: 999px;
        background: #0d1117;
        color: #aab7c4;
        font-size: 0.85rem;
        padding: 0.42rem 0.8rem;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      iframe {
        display: block;
        width: 100%;
        min-height: 0;
        flex: 1;
        border: 0;
        background: #0a0a0a;
      }

      @media (max-width: 780px) {
        header {
          align-items: start;
          flex-direction: column;
        }

        nav {
          justify-content: start;
        }

        .bar {
          grid-template-columns: auto 1fr;
        }

        .bar a {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>AI Agent Swarm Game</h1>
          <p>
            A live Vercel preview window for the six-mode demo. Use the links
            to jump straight to the showcase routes.
          </p>
        </div>
        <nav aria-label="Preview routes">
          <a href="/manual">Manual</a>
          <a href="/chat">Chat</a>
          <a href="/tool-use">Tool Use</a>
          <a href="/agent">Agent</a>
          <a href="/team">Team</a>
          <a href="/swarm">Swarm</a>
        </nav>
      </header>

      <section class="browser" aria-label="Live app preview">
        <div class="bar">
          <div class="lights" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="address">what-are-agents-presentation.vercel.app</div>
          <a href="/" target="_blank" rel="noreferrer">Open full app</a>
        </div>
        <iframe src="/" title="Live AI Agent Swarm Game preview"></iframe>
      </section>
    </main>
  </body>
</html>
